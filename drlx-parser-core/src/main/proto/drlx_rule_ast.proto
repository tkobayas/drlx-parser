syntax = "proto3";

package org.drools.drlx.builder.proto;

option java_package = "org.drools.drlx.builder.proto";
option java_outer_classname = "DrlxRuleAstProto";

message CompilationUnitParseResult {
  string source_hash = 1;
  string package_name = 2;
  repeated string imports = 3;
  repeated RuleParseResult rules = 4;
  string unit_name = 5;
}

message RuleParseResult {
  string name = 1;
  reserved 2;                                      // retired flat `items` field
  repeated RuleAnnotationParseResult annotations = 3;
  repeated LhsItemParseResult lhs = 4;             // NEW — tree-shape LHS
  ConsequenceParseResult rhs = 5;                  // NEW — consequence out of items
  repeated RuleParameterParseResult parameters = 6;
}

message RuleParameterParseResult {
  string type_name = 1;
  string param_name = 2;
}

message LhsItemParseResult {
  oneof kind {
    PatternParseResult pattern = 1;
    GroupElementParseResult group = 2;
    EvalParseResult eval = 3;
    AccumulatePatternParseResult accumulate_pattern = 4;
    CustomAccumulateParseResult custom_accumulate = 5;
  }
}

message EvalParseResult {
  string expression = 1;
  repeated string referenced_bindings = 2;
}

message GroupElementParseResult {
  GroupElementKind kind = 1;
  repeated LhsItemParseResult children = 2;        // recursive
}

message PatternParseResult {
  string type_name = 1;
  string bind_name = 2;
  string entry_point = 3;
  repeated string conditions = 4;
  string cast_type_name = 5;
  repeated string positional_args = 6;
  bool passive = 7;
  repeated string watched_properties = 8;
  string window_type = 9;
  string window_parameter = 10;
  repeated TemporalConditionParseResult temporal_conditions = 11;
}

message TemporalConditionParseResult {
  string operator = 1;
  bool negated = 2;
  repeated string parameters = 3;
  string right_binding = 4;
}

message ConsequenceParseResult {
  string block = 1;
}

message RuleAnnotationParseResult {
  AnnotationKind kind = 1;
  string raw_value = 2;
}

enum AnnotationKind {
  ANNOTATION_KIND_UNSPECIFIED = 0;
  ANNOTATION_KIND_SALIENCE = 1;
  ANNOTATION_KIND_DESCRIPTION = 2;
  ANNOTATION_KIND_DATASOURCE = 3;
  ANNOTATION_KIND_NO_LOOP = 4;
  ANNOTATION_KIND_LOCK_ON_ACTIVE = 5;
  reserved 6, 8, 10;
  reserved "ANNOTATION_KIND_AUTO_FOCUS", "ANNOTATION_KIND_AGENDA_GROUP", "ANNOTATION_KIND_RULEFLOW_GROUP";
  ANNOTATION_KIND_DISABLED = 7;
  ANNOTATION_KIND_ACTIVATION_GROUP = 9;
}

enum GroupElementKind {
  GROUP_ELEMENT_KIND_UNSPECIFIED = 0;
  GROUP_ELEMENT_KIND_NOT = 1;
  GROUP_ELEMENT_KIND_EXISTS = 2;
  GROUP_ELEMENT_KIND_AND = 3;
  GROUP_ELEMENT_KIND_OR = 4;
}

message AccumulatePatternParseResult {
  LhsItemParseResult source = 1;
  repeated AccumulatorParseResult accumulators = 2;
}

message AccumulatorParseResult {
  string result_type_name = 1;
  string result_bind_name = 2;
  string function_name = 3;
  repeated string arg_expressions = 4;
  repeated string referenced_bindings = 5;
}

message CustomAccumulateParseResult {
  LhsItemParseResult source = 1;
  repeated InitVarParseResult init_vars = 2;
  string action_block = 3;
  string reverse_block = 4;
  string result_type_name = 5;
  string result_bind_name = 6;
  string result_expression = 7;
  repeated string referenced_bindings = 8;
}

message InitVarParseResult {
  string type_name = 1;
  string name = 2;
  string initializer = 3;
}
