syntax = "proto3";

package org.drools.drlx.builder.proto;

option java_package = "org.drools.drlx.builder.proto";
option java_outer_classname = "DrlxRuleAstProto";

message CompilationUnitSnapshot {
  string source_hash = 1;
  string package_name = 2;
  repeated string imports = 3;
  repeated RuleSnapshot rules = 4;
}

message RuleSnapshot {
  string name = 1;
  repeated RuleItemSnapshot items = 2;
}

message RuleItemSnapshot {
  oneof item {
    PatternSnapshot pattern = 1;
    ConsequenceSnapshot consequence = 2;
  }
}

message PatternSnapshot {
  string type_name = 1;
  string bind_name = 2;
  string entry_point = 3;
  repeated string conditions = 4;
}

message ConsequenceSnapshot {
  string block = 1;
}
